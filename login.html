<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin — Adriano's Closet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      padding: 1.5rem;
    }
    .login-box {
      background: #fff;
      border-radius: 8px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .login-box h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: .05em;
      margin-bottom: .3rem;
    }
    .login-box p.sub { color: #757575; font-size: .85rem; margin-bottom: 1.5rem; }
    .login-error {
      display: none;
      background: #fdecea;
      color: #b3261e;
      padding: .6rem .8rem;
      border-radius: 4px;
      font-size: .82rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body class="admin-body">
  <div class="login-wrap">
    <div class="login-box">
      <h1>ADRIANO'S <span>CLOSET</span></h1>
      <p class="sub">Área de Administração</p>

      <div class="login-error" id="loginError"></div>

      <form id="loginForm" novalidate>
        <div class="field" style="margin-bottom:1rem">
          <label>Utilizador</label>
          <input type="text" id="fUsername" placeholder="adriano" autocomplete="username" required>
        </div>
        <div class="field" style="margin-bottom:1.5rem">
          <label>Password</label>
          <input type="password" id="fPassword" placeholder="••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary btn-full" id="loginBtn">Entrar</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('fUsername').value;
      const password = document.getElementById('fPassword').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'A entrar...';

      try {
        await loginAdmin(username, password);
        window.location.href = 'admin.html';
      } catch (err) {
        errorEl.textContent = err.message || 'Utilizador ou password inválidos.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });

    // Se já houver sessão ativa, salta direto para o admin.
    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) window.location.href = 'admin.html';
    })();
  </script>
</body>
</html>
